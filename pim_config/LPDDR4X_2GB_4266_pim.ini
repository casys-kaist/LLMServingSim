# 
# LPDDR4X-4266 (smart phone class)
# 
[dram_structure]
protocol = LPDDR4
bankgroups        = 4            # JEDEC LPDDR4X spec
banks_per_group   = 4
rows = 65536
columns = 1024
device_width = 16
BL = 16
pim_type = SINGLE

[timing]
tCK      = 0.468         # ns  (1/2133 MHz)
AL       = 0
CL       = 36            # RL‑A @4266 MT/s
CWL      = 18            # WL‑A @4266 MT/s
tRCD     = 39
tRP      = 39
tRAS     = 90
tRFC     = 812           # 380 ns / 0.468 ns
tRFC2    = 542           # ≈ tRFCab×0.67
tRFC4    = 306           # ≈ tRFCab×0.38
tREFI    = 16666         # 7.8 µs / 0.468 ns
tRPRE    = 1
tWPRE    = 1
tRRD_S   = 16
tRRD_L   = 16
tWTR_S   = 22
tWTR_L   = 44
tFAW     = 64
tWR      = 39
tWR2     = 42
tRTP     = 16
tCCD_S   = 4
tCCD_L   = 8
tCKE     = 6
tCKESR   = 7
tXS      = 860           # tRFCab + 7.5 ns
tXP      = 6
tRTRS    = 1
tPPD     = 2


[power]
VDD      = 1.1
IDD0     = 90
IPP0     = 4.0
IDD2P    = 28
IDD2N    = 38
IDD3P    = 45
IDD3N    = 52
IDD4W    = 250
IDD4R    = 260
IDD5AB   = 300
IDD6x    = 32


[system]
channel_size = 2048
channels = 1
bus_width = 16
address_mapping = rochrababgco
queue_structure = PER_BANK
refresh_policy = RANK_LEVEL_STAGGERED
row_buf_policy = OPEN_PAGE
cmd_queue_size = 128
trans_queue_size = 32

[other]
epoch_period = 1204819
output_level = 1
data_rate = 4266 # MT/s
idle_power = 70 # mW
peak_power = 771 # mW