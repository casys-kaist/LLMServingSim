# --------------------------------------------
# LPDDR5-6400  (128-bit, 16 GB total, 102.4 GB/s)
# --------------------------------------------
#  lpddr_freq        = 6400          # MT/s (= 3 200 MHz CK)
[dram_structure]
protocol = LPDDR4
bankgroups        = 4            # JEDEC LPDDR4X spec
banks_per_group   = 4
rows = 65536
columns = 1024
device_width = 16
BL = 16
pim_type = SINGLE

[timing]                       # *** cycles unless noted ***
tCK      = 0.3125              # ns (1/3 200 MHz)
AL       = 0
CL       = 34                  # RL-A @6400 MT/s
CWL      = 16                  # WL-A
tRCD     = 34
tRP      = 34
tRAS     = 134                 # 42 ns / 0.3125
tRFC     = 1216                # 380 ns / 0.3125
tRFC2    = 816
tRFC4    = 461
tREFI    = 24960               # 7.8 µs / 0.3125
tRPRE    = 1
tWPRE    = 1
tRRD_S   = 12
tRRD_L   = 12
tWTR_S   = 16
tWTR_L   = 32
tFAW     = 48
tWR      = 34
tWR2     = 36
tRTP     = 12
tCCD_S   = 4
tCCD_L   = 8
tCKE     = 6
tCKESR   = 7
tXS      = 1230               # tRFCab + 7.5 ns
tXP      = 6
tRTRS    = 1
tPPD     = 2

[power]                       # LPDDR5 (core 1.05 V)
VDD      = 1.05
IDD0     = 100
IPP0     = 4.5
IDD2P    = 30
IDD2N    = 40
IDD3P    = 48
IDD3N    = 55
IDD4W    = 280
IDD4R    = 295
IDD5AB   = 340
IDD6x    = 35

[system]
channel_size = 2048     # unit: MB
channels = 1
bus_width = 16
address_mapping = rochrababgco
queue_structure = PER_BANK
refresh_policy = RANK_LEVEL_STAGGERED
row_buf_policy = OPEN_PAGE
cmd_queue_size = 256
trans_queue_size = 64

[other]
epoch_period = 1204819
output_level = 1
data_rate = 6400 # MT/s
idle_power = 71 # mW
peak_power = 877 # mW